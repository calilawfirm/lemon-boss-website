<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(() => {
    const h = window.location.hash.replace('#', '');
    return h || 'home';
  });
  React.useEffect(() => {
    const onHash = () => setRoute(window.location.hash.replace('#', '') || 'home');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = (r) => {
    window.location.hash = r;
    setRoute(r);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };
  const onEstimator = () => go('estimator');

  let Page;
  switch (route) {
    case 'how':       Page = <HowItWorksPage go={go} onEstimator={onEstimator} />; break;
    case 'qualify':   Page = <QualifyPage go={go} onEstimator={onEstimator} />; break;
    case 'results':   Page = <ResultsPage go={go} onEstimator={onEstimator} />; break;
    case 'faq':       Page = <FAQPage onEstimator={onEstimator} />; break;
    case 'signin':    Page = <SignInPage go={go} />; break;
    case 'estimator': Page = <EstimatorPage go={go} />; break;
    case 'about':     Page = <AboutPage go={go} onEstimator={onEstimator} />; break;
    case 'attorneys': Page = <AttorneysPage go={go} onEstimator={onEstimator} />; break;
    case 'contact':   Page = <ContactPage go={go} />; break;
    case 'privacy':   Page = <PrivacyPage />; break;
    case 'terms':     Page = <TermsPage />; break;
    case 'disclaimer':Page = <DisclaimerPage />; break;
    default:          Page = <HomePage go={go} onEstimator={onEstimator} />;
  }
  return (
    <div>
      <Nav route={route} go={go} onEstimator={onEstimator} />
      {Page}
      <Footer go={go} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
